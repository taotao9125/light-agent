<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AgentEvent Log — 能力演示中心</title>
  <style>
    :root {
      --bg: #0b0f14;
      --surface: #151c28;
      --surface2: #1e2838;
      --border: #2a3649;
      --text: #e8eef7;
      --muted: #8fa3bf;
      --accent: #3b82f6;
      --input: #22c55e;
      --thought: #a78bfa;
      --action: #f59e0b;
      --observation: #06b6d4;
      --output: #34d399;
      --error: #ef4444;
      --warn: #fbbf24;
      font-family: "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-size: 14px; }
    .shell { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
    @media (max-width: 800px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar { border-bottom: 1px solid var(--border); }
    }
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 1.25rem 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .sidebar h1 { font-size: 1rem; margin: 0 1rem 0.25rem; font-weight: 600; }
    .sidebar .sub { font-size: 0.72rem; color: var(--muted); margin: 0 1rem 1rem; line-height: 1.4; }
    .nav { list-style: none; margin: 0; padding: 0; }
    .nav button {
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      border-left: 3px solid transparent;
      color: var(--muted);
      padding: 0.55rem 1rem;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .nav button:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .nav button.active {
      color: var(--text);
      border-left-color: var(--accent);
      background: rgba(59, 130, 246, 0.12);
    }
    .nav .tag {
      float: right;
      font-size: 0.62rem;
      padding: 0.1rem 0.35rem;
      border-radius: 4px;
      background: var(--surface2);
      color: var(--muted);
    }
    .main { padding: 1.5rem 2rem 3rem; max-width: 1100px; }
    .panel { display: none; animation: fade 0.2s ease; }
    .panel.active { display: block; }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    .panel h2 { margin: 0 0 0.35rem; font-size: 1.35rem; }
    .panel .lead { color: var(--muted); margin: 0 0 1.25rem; max-width: 40rem; line-height: 1.55; }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
    }
    .card .l { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .card .v { font-size: 1.35rem; font-weight: 600; margin-top: 0.2rem; }
    .box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    th, td { text-align: left; padding: 0.45rem 0.6rem; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .pill {
      display: inline-block;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      font-size: 0.68rem;
      font-weight: 600;
    }
    .pipe-step {
      display: flex;
      gap: 1rem;
      margin-bottom: 0.75rem;
      align-items: flex-start;
    }
    .pipe-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .pipe-body { flex: 1; min-width: 0; }
    .pipe-body h3 { margin: 0 0 0.25rem; font-size: 0.9rem; }
    .pipe-body p { margin: 0; font-size: 0.78rem; color: var(--muted); }
    .pipe-events {
      margin-top: 0.5rem;
      font-family: ui-monospace, monospace;
      font-size: 0.68rem;
      color: #94a3b8;
      max-height: 80px;
      overflow-y: auto;
    }
    .branch-tree { display: flex; flex-direction: column; gap: 1rem; align-items: center; }
    .branch-node {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      max-width: 420px;
      width: 100%;
      cursor: pointer;
    }
    .branch-node.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
    .branch-fork { color: var(--muted); font-size: 0.85rem; }
    .diff-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 700px) { .diff-grid { grid-template-columns: 1fr; } }
    .diff-col h3 { font-size: 0.85rem; margin: 0 0 0.5rem; }
    .diff-line {
      font-family: ui-monospace, monospace;
      font-size: 0.72rem;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      margin-bottom: 0.2rem;
    }
    .diff-same { color: var(--muted); }
    .diff-changed { background: rgba(251, 191, 36, 0.15); }
    .diff-added { background: rgba(34, 197, 94, 0.12); }
    .diff-removed { background: rgba(239, 68, 68, 0.12); text-decoration: line-through; }
    .bar-chart { display: flex; flex-direction: column; gap: 0.5rem; }
    .bar-row { display: flex; align-items: center; gap: 0.75rem; font-size: 0.78rem; }
    .bar-label { width: 100px; color: var(--muted); flex-shrink: 0; }
    .bar-track { flex: 1; height: 20px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; }
    .trace-gantt {
      position: relative;
      height: 200px;
      background: var(--surface2);
      border-radius: 8px;
      margin-top: 0.5rem;
      overflow: hidden;
    }
    .trace-bar {
      position: absolute;
      height: 14px;
      border-radius: 3px;
      font-size: 0.6rem;
      color: #fff;
      padding: 0 4px;
      overflow: hidden;
      white-space: nowrap;
    }
    .tool-flow {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .tool-node {
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      font-size: 0.78rem;
      border: 1px solid var(--border);
    }
    .tool-arrow { color: var(--muted); }
    .approval {
      border: 2px dashed var(--warn);
      border-radius: 12px;
      padding: 1.25rem;
      background: rgba(251, 191, 36, 0.06);
    }
    .approval button {
      margin-right: 0.5rem;
      margin-top: 0.75rem;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
    }
    .approval button.approve { background: var(--input); border-color: var(--input); color: #000; }
    .approval button.deny { background: var(--error); border-color: var(--error); }
    .iframe-wrap {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      height: min(70vh, 640px);
    }
    .iframe-wrap iframe { width: 100%; height: 100%; border: none; }
    .export-pre {
      font-size: 0.72rem;
      background: #0a0e14;
      padding: 1rem;
      border-radius: 8px;
      overflow: auto;
      max-height: 280px;
    }
    .arch {
      font-family: ui-monospace, monospace;
      font-size: 0.72rem;
      line-height: 1.5;
      color: #94a3b8;
      white-space: pre;
      background: #0a0e14;
      padding: 1rem;
      border-radius: 8px;
    }
    a.link { color: var(--accent); }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <h1>Event Log 演示</h1>
      <p class="sub">同一 append-only 流 · 多种投影</p>
      <ul class="nav" id="nav"></ul>
      <p class="sub" style="margin-top:1.5rem">
        <a class="link" href="event-log-report.html">完整报表</a><br />
        <a class="link" href="replay.html">独立回放页</a>
      </p>
    </aside>
    <main class="main" id="main"></main>
  </div>

  <script src="demo-log.js"></script>
  <script src="demo-utils.js"></script>
  <script>
    const LOG = window.DEMO_LOG;
    const SESSION = window.DEMO_SESSION;
    const U = window.DemoUtils;
    const C = window.DEMO_TYPE_COLORS;

    const PANELS = [
      { id: 'overview', label: '总览', tag: 'home' },
      { id: 'audit', label: '审计与检索', tag: 'audit' },
      { id: 'context', label: 'Context Pipeline', tag: 'pipe' },
      { id: 'replay', label: '会话回放', tag: 'replay' },
      { id: 'branch', label: '分支时间线', tag: 'fork' },
      { id: 'eval', label: 'Eval 对比', tag: 'eval' },
      { id: 'cost', label: '成本与 Token', tag: '$' },
      { id: 'trace', label: 'Trace 时间线', tag: 'trace' },
      { id: 'tools', label: '工具链拓扑', tag: 'tool' },
      { id: 'approval', label: '人工审批', tag: 'HITL' },
      { id: 'export', label: '导出与集成', tag: 'API' },
    ];

    function pill(type) {
      const bg = C[type] || '#666';
      return `<span class="pill" style="background:${bg}33;color:${bg}">${type}</span>`;
    }

    function renderOverview() {
      const s = U.computeStats(LOG);
      return `
        <section class="panel active" data-panel="overview">
          <h2>Event Log 能力总览</h2>
          <p class="lead">一条 <strong>append-only</strong> 的 AgentEvent 流，通过不同<strong>只读投影</strong>支撑报表、回放、审计、context 裁剪、分支、评测——无需为每个功能维护独立数据库。</p>
          <div class="cards">
            <div class="card"><div class="l">事件</div><div class="v">${s.events}</div></div>
            <div class="card"><div class="l">Rounds</div><div class="v">${s.rounds}</div></div>
            <div class="card"><div class="l">工具调用</div><div class="v">${s.tools}</div></div>
            <div class="card"><div class="l">Tokens</div><div class="v">${s.tokens}</div></div>
            <div class="card"><div class="l">总延迟</div><div class="v">${(s.latency / 1000).toFixed(1)}s</div></div>
            <div class="card"><div class="l">Session</div><div class="v" style="font-size:0.75rem">${SESSION.sessionId}</div></div>
          </div>
          <div class="box">
            <h3 style="margin:0 0 0.75rem;font-size:0.95rem">架构：一个写入，多个投影</h3>
            <pre class="arch">  User / Agent / Tools
           │
           ▼ append (唯一写)
    ┌──────────────────┐
    │  AgentEvent Log   │  seq · eventId · meta (round/turn/trace/usage…)
    └────────┬─────────┘
             │ read-only
    ┌────────┼────────┬──────────┬──────────┬──────────┐
    ▼        ▼        ▼          ▼          ▼          ▼
  Replay   Audit   Context     Eval      Cost      Export
  (UI)    (合规)   Pipeline   (diff)   (token)   (JSONL)</pre>
          </div>
          <div class="box">
            <h3 style="margin:0 0 0.5rem;font-size:0.95rem">本演示包含的扩展能力</h3>
            <ul style="margin:0;padding-left:1.2rem;color:var(--muted);line-height:1.8;font-size:0.85rem">
              <li>审计表：按 type / traceId 过滤</li>
              <li>Context pipe：窗口 → 摘要 → 发给模型</li>
              <li>回放：步进 / 流式模拟（见「会话回放」）</li>
              <li>分支：fork 后平行时间线</li>
              <li>Eval：两次 run 的 seq 级 diff</li>
              <li>成本：按 round 聚合 token</li>
              <li>Trace：latency Gantt</li>
              <li>工具链：action → observation 图</li>
              <li>HITL：待审批 action 再 append</li>
              <li>导出：JSONL / 订阅 webhook 示意</li>
            </ul>
          </div>
        </section>`;
    }

    function renderAudit() {
      const rows = LOG.map(
        (e) => `<tr>
          <td>${e.seq}</td>
          <td>${pill(e.type)}</td>
          <td>${U.escapeHtml((e.text || e.name || '').slice(0, 48))}</td>
          <td><code>${e.meta?.roundId?.slice(0, 12) ?? '—'}…</code></td>
          <td>${e.meta?.turn ?? '—'}</td>
          <td><code>${e.meta?.traceId?.slice(0, 14) ?? '—'}</code></td>
          <td>${e.meta?.actor ?? '—'}</td>
        </tr>`,
      ).join('');
      return `
        <section class="panel" data-panel="audit">
          <h2>审计与检索</h2>
          <p class="lead">合规 / 安全团队按 seq、traceId、actor 检索。真实场景可加全文索引、保留策略、脱敏字段。</p>
          <div class="box">
            <label style="font-size:0.8rem;color:var(--muted)">过滤 type
              <select id="auditFilter" style="margin-left:0.5rem;background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:0.25rem">
                <option value="">全部</option>
                ${[...new Set(LOG.map((e) => e.type))].map((t) => `<option value="${t}">${t}</option>`).join('')}
              </select>
            </label>
            <table style="margin-top:0.75rem" id="auditTable">
              <thead><tr><th>seq</th><th>type</th><th>摘要</th><th>round</th><th>turn</th><th>trace</th><th>actor</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </section>`;
    }

    function renderContext() {
      const stages = U.buildContextPipeline(LOG, { maxRounds: 2, summarizeBeforeSeq: 12 });
      const steps = stages
        .map(
          (s, i) => `<div class="pipe-step">
          <div class="pipe-num">${i + 1}</div>
          <div class="pipe-body">
            <h3>${U.escapeHtml(s.name)} <span style="color:var(--accent)">${s.count} 条</span></h3>
            <p>${U.escapeHtml(s.note)}</p>
            <div class="pipe-events">${s.events.map((e) => `seq ${e.seq} ${e.type}`).join(' · ')}</div>
          </div>
        </div>`,
        )
        .join('');
      return `
        <section class="panel" data-panel="context">
          <h2>Context Pipeline</h2>
          <p class="lead">contextBuilder 作为<strong>只读 pipe</strong>：不改变真相源，只生成「本次请求发给模型的视图」。旧 round 可压缩为 summary 事件。</p>
          <div class="box">${steps}</div>
        </section>`;
    }

    function renderReplay() {
      return `
        <section class="panel" data-panel="replay">
          <h2>会话回放</h2>
          <p class="lead">从同一条 log 重放 UI（thought 流式、工具卡片）。嵌入独立回放页。</p>
          <div class="iframe-wrap">
            <iframe src="replay.html" title="Session Replay"></iframe>
          </div>
        </section>`;
    }

    function renderBranch() {
      return `
        <section class="panel" data-panel="branch">
          <h2>分支时间线</h2>
          <p class="lead">在任意 seq 后 fork 新 roundId，保留父 log 前缀，实现「换一种修法」对比。点击分支查看该时间线末端 output。</p>
          <div class="branch-tree box">
            <div class="branch-node" data-branch="main">
              <strong>主时间线</strong>（继续修复 → 21 tests passed）<br />
              <span class="branch-fork">round_e4f5g6h7 · ${LOG.length} events</span>
            </div>
            <div class="branch-fork">↳ fork @ seq 11</div>
            <div class="branch-node" data-branch="alt">
              <strong>分支 B</strong>（放弃自动修复）<br />
              <span class="branch-fork">${window.DEMO_LOG_BRANCH_ALT.length} events · 较短路径</span>
            </div>
            <div id="branchPreview" style="width:100%;max-width:480px;font-size:0.85rem;color:var(--muted);margin-top:0.5rem"></div>
          </div>
        </section>`;
    }

    function renderEval() {
      const a = LOG;
      const b = window.DEMO_LOG_RUN_B;
      const diff = U.diffLogs(a, b);
      const lines = diff
        .slice(0, 24)
        .map((d) => {
          if (d.kind === 'same')
            return `<div class="diff-line diff-same">= seq ${d.base.seq} ${d.base.type}</div>`;
          if (d.kind === 'changed')
            return `<div class="diff-line diff-changed">~ seq ${d.base.seq} ${d.base.type} (内容不同)</div>`;
          if (d.kind === 'added')
            return `<div class="diff-line diff-added">+ seq ${d.other.seq} ${d.other.type}</div>`;
          return `<div class="diff-line diff-removed">− seq ${d.base.seq} ${d.base.type}</div>`;
        })
        .join('');
      return `
        <section class="panel" data-panel="eval">
          <h2>Eval / 回归对比</h2>
          <p class="lead">固定 INPUT 为数据集，对比两次 run 的 event diff：更短路径、更少 tool 失败、token 更省 → 自动评分。</p>
          <div class="diff-grid">
            <div class="diff-col box">
              <h3>Run A（主 log）· ${a.length} events · ${U.computeStats(a).tokens} tokens</h3>
              <p style="font-size:0.78rem;color:var(--muted)">多轮 + 一次失败 observation</p>
            </div>
            <div class="diff-col box">
              <h3>Run B（优化后）· ${b.length} events · ${U.computeStats(b).tokens} tokens</h3>
              <p style="font-size:0.78rem;color:var(--muted)">单 round 修好，省约 40% 事件</p>
            </div>
          </div>
          <div class="box"><h3 style="margin:0 0 0.5rem;font-size:0.9rem">Seq 级 diff</h3>${lines}</div>
        </section>`;
    }

    function renderCost() {
      const rounds = U.groupByRound(LOG);
      const maxTok = Math.max(
        ...rounds.map((r) =>
          r.events.reduce((s, e) => {
            const u = e.meta?.usage;
            return s + (u ? u.promptTokens + u.completionTokens : 0);
          }, 0),
        ),
        1,
      );
      const bars = rounds
        .map((r) => {
          const tok = r.events.reduce((s, e) => {
            const u = e.meta?.usage;
            return s + (u ? u.promptTokens + u.completionTokens : 0);
          }, 0);
          const pct = (tok / maxTok) * 100;
          const label = r.input?.text?.slice(0, 12) ?? r.roundId.slice(0, 10);
          return `<div class="bar-row">
            <span class="bar-label">${U.escapeHtml(label)}…</span>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:var(--accent)"></div></div>
            <span>${tok}</span>
          </div>`;
        })
        .join('');
      return `
        <section class="panel" data-panel="cost">
          <h2>成本与 Token</h2>
          <p class="lead">从 log meta.usage 聚合：按 round / 按天 / 按用户计费。可接告警阈值。</p>
          <div class="box bar-chart">${bars}</div>
          <div class="box" style="font-size:0.8rem;color:var(--muted)">
            扩展：按 tool name、model、provider 维度出账单；与 <code>traceId</code> 关联到 HTTP 请求。
          </div>
        </section>`;
    }

    function renderTrace() {
      const spans = U.eventsToTraceSpans(LOG);
      if (!spans.length) return '';
      const t0 = Math.min(...spans.map((s) => s.start));
      const t1 = Math.max(...spans.map((s) => s.start + s.duration));
      const range = t1 - t0 || 1;
      const bars = spans
        .map((s, i) => {
          const left = ((s.start - t0) / range) * 100;
          const w = Math.max((s.duration / range) * 100, 2);
          const c = C[s.type] || '#666';
          return `<div class="trace-bar" style="left:${left}%;width:${w}%;top:${12 + i * 18}px;background:${c}" title="seq ${s.seq} ${s.duration}ms">${s.label}</div>`;
        })
        .join('');
      return `
        <section class="panel" data-panel="trace">
          <h2>Trace 时间线</h2>
          <p class="lead">用 meta.at + latencyMs 画 Gantt，对齐分布式 traceId。与 OpenTelemetry span 同构。</p>
          <div class="box">
            <div class="trace-gantt">${bars}</div>
            <p style="font-size:0.75rem;color:var(--muted);margin:0.75rem 0 0">横轴 = 会话时间 · 条宽 = latencyMs</p>
          </div>
        </section>`;
    }

    function renderTools() {
      const chains = U.extractToolChains(LOG);
      const flows = chains
        .map(
          (c) => `<div class="tool-flow">
          <span class="tool-node" style="border-color:var(--action)">⚙ ${U.escapeHtml(c.action.name)}</span>
          <span class="tool-arrow">→</span>
          <span class="tool-node" style="border-color:${c.observation?.isError ? 'var(--error)' : 'var(--observation)'}">
            ${c.observation?.isError ? '✗' : '✓'} ${U.escapeHtml(String(c.observation?.result ?? '').slice(0, 40))}…
          </span>
        </div>`,
        )
        .join('');
      return `
        <section class="panel" data-panel="tools">
          <h2>工具链拓扑</h2>
          <p class="lead">ACTION.id ↔ OBSERVATION.id 天然成链。可扩展为 DAG（并行 tool）、MCP server 标签。</p>
          <div class="box">${flows}</div>
        </section>`;
    }

    function renderApproval() {
      const p = window.DEMO_PENDING_APPROVAL;
      return `
        <section class="panel" data-panel="approval">
          <h2>人工审批 (HITL)</h2>
          <p class="lead">高风险 action 先 append <code>approval_pending</code>，人确认后再 append observation 并继续 loop。</p>
          <div class="approval" id="approvalBox">
            <div>${pill('action')} <strong>${U.escapeHtml(p.name)}</strong> 待审批</div>
            <pre class="tool-args" style="margin-top:0.75rem;background:#0a0e14;padding:0.75rem;border-radius:8px;font-size:0.78rem">${U.escapeHtml(JSON.stringify(p.args, null, 2))}</pre>
            <p style="font-size:0.8rem;color:var(--warn);margin:0.5rem 0 0">meta.requiresApproval = true</p>
            <button type="button" class="approve" id="btnApprove">批准并执行</button>
            <button type="button" class="deny" id="btnDeny">拒绝</button>
            <div id="approvalResult" style="margin-top:1rem;font-size:0.85rem"></div>
          </div>
        </section>`;
    }

    function renderExport() {
      const sample = LOG.slice(0, 3)
        .map((e) => JSON.stringify(e))
        .join('\n');
      return `
        <section class="panel" data-panel="export">
          <h2>导出与集成</h2>
          <p class="lead">同一条 JSONL 可订阅到 SIEM、数据仓库、Webhook；或按 seq 增量同步给多端 UI。</p>
          <div class="box">
            <h3 style="margin:0 0 0.5rem;font-size:0.9rem">JSONL 片段（每行一事件）</h3>
            <pre class="export-pre">${U.escapeHtml(sample)}\n…</pre>
          </div>
          <div class="box" style="font-size:0.82rem">
            <strong>订阅示例</strong>
            <pre class="arch" style="margin-top:0.5rem">sessionLog.on('append', (event) => {
  webhook.post('/audit', { sessionId, event });
  if (event.type === 'action') metrics.increment('tool.call', { name: event.name });
});</pre>
          </div>
        </section>`;
    }

    function buildNav() {
      const nav = document.getElementById('nav');
      nav.innerHTML = PANELS.map(
        (p) => `<li><button type="button" data-nav="${p.id}" class="${p.id === 'overview' ? 'active' : ''}">
          ${p.label} <span class="tag">${p.tag}</span>
        </button></li>`,
      ).join('');
    }

    function showPanel(id) {
      document.querySelectorAll('.panel').forEach((el) => {
        el.classList.toggle('active', el.dataset.panel === id);
      });
      document.querySelectorAll('.nav button').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.nav === id);
      });
      if (id === 'audit') bindAuditFilter();
      if (id === 'branch') bindBranch();
      if (id === 'approval') bindApproval();
    }

    function bindAuditFilter() {
      const sel = document.getElementById('auditFilter');
      const tbody = document.querySelector('#auditTable tbody');
      if (!sel || sel.dataset.bound) return;
      sel.dataset.bound = '1';
      sel.addEventListener('change', () => {
        const v = sel.value;
        tbody.innerHTML = LOG.filter((e) => !v || e.type === v)
          .map(
            (e) => `<tr>
              <td>${e.seq}</td>
              <td>${pill(e.type)}</td>
              <td>${U.escapeHtml((e.text || e.name || '').slice(0, 48))}</td>
              <td><code>${e.meta?.roundId?.slice(0, 12) ?? '—'}…</code></td>
              <td>${e.meta?.turn ?? '—'}</td>
              <td><code>${e.meta?.traceId?.slice(0, 14) ?? '—'}</code></td>
              <td>${e.meta?.actor ?? '—'}</td>
            </tr>`,
          )
          .join('');
      });
    }

    function bindBranch() {
      const preview = document.getElementById('branchPreview');
      document.querySelectorAll('[data-branch]').forEach((node) => {
        node.addEventListener('click', () => {
          document.querySelectorAll('[data-branch]').forEach((n) => n.classList.remove('selected'));
          node.classList.add('selected');
          const log = node.dataset.branch === 'alt' ? window.DEMO_LOG_BRANCH_ALT : LOG;
          const out = log.filter((e) => e.type === 'output').pop();
          preview.innerHTML = `<strong>末端 output：</strong><br />${U.escapeHtml(out?.text ?? '—')}`;
        });
      });
      document.querySelector('[data-branch="main"]')?.click();
    }

    function bindApproval() {
      const out = document.getElementById('approvalResult');
      document.getElementById('btnApprove')?.addEventListener('click', () => {
        out.innerHTML = `${pill('observation')} 已 append：<code>rm completed (sandbox)</code> → loop 继续`;
        out.style.color = 'var(--output)';
      });
      document.getElementById('btnDeny')?.addEventListener('click', () => {
        out.innerHTML = `${pill('observation')} 已 append isError：用户拒绝执行`;
        out.style.color = 'var(--error)';
      });
    }

    document.getElementById('main').innerHTML = [
      renderOverview(),
      renderAudit(),
      renderContext(),
      renderReplay(),
      renderBranch(),
      renderEval(),
      renderCost(),
      renderTrace(),
      renderTools(),
      renderApproval(),
      renderExport(),
    ].join('');

    buildNav();
    document.getElementById('nav').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-nav]');
      if (btn) showPanel(btn.dataset.nav);
    });

    bindAuditFilter();
  </script>
</body>
</html>
