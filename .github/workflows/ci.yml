name: CI

env:
  IMAGE_NAME: ${{ secrets.DOCKER_REGISTER }}/yangblue/test

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test:ci

      - name: Login ACR
        run: echo "${{ secrets.DOCKER_REGISTER_PWD }}" | docker login ${{
          secrets.DOCKER_REGISTER }} -u ${{ secrets.DOCKER_REGISTER_USERNAME }}
          --password-stdin

      - name: Generate image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Image
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest .

      - name: Push image by commit tag
        run: docker push $IMAGE_NAME:$IMAGE_TAG

      - name: Push Image
        run: docker push $IMAGE_NAME:latest

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_PEM }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} '
            set -e
            cd /root/booking

            echo "start pull image"
            docker compose --env-file .env.prod -f docker compose.prod.yaml pull backend
            echo "start run container"
            docker compose --env-file .env.prod -f docker compose.prod.yaml up -d

            echo "Health check"
            for i in {1..10}; do
              if curl -f http://localhost:3000/health; then
                echo "Deploy success"
                exit 0
              fi
              echo "Waiting for app..."
              sleep 2
            done

            echo "Deploy failed"
            docker logs meeting_backend --tail=100
            exit 1
          '
      # - name: Login DockerHub
      #   run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{
      #     secrets.DOCKER_USERNAME }}" --password-stdin

      # - name: Push Image
