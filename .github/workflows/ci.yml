name: CI



env:
  IMAGE_NAME: ${{ secrets.DOCKER_REGISTER }}/yangblue/test

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test:ci

      - name: Login ACR
        run: echo "${{ secrets.DOCKER_REGISTER_PWD }}" | docker login ${{ secrets.DOCKER_REGISTER }} -u ${{ secrets.DOCKER_REGISTER_USERNAME }} --password-stdin

      - name: Generate image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Image
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest .

      - name: Push image by commit tag
        run: docker push $IMAGE_NAME:$IMAGE_TAG

      - name: Push Image
        run: docker push $IMAGE_NAME:latest
