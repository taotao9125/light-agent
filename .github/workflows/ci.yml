name: CI

env:
  IMAGE_NAME: ${{ secrets.DOCKER_REGISTER }}/yangblue/test
  DEPLOY_DIR: /root/booking

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test:ci

      - name: Login ACR
        run: |
          echo "${{ secrets.DOCKER_REGISTER_PWD }}" | docker login ${{ secrets.DOCKER_REGISTER }} \
            -u ${{ secrets.DOCKER_REGISTER_USERNAME }} \
            --password-stdin

      - name: Generate image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build image
        run: docker build -t "$IMAGE_NAME:$IMAGE_TAG" -t "$IMAGE_NAME:latest" .

      - name: Push image by commit tag
        run: docker push "$IMAGE_NAME:$IMAGE_TAG"

      - name: Push latest image
        run: docker push "$IMAGE_NAME:latest"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_PEM }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts

      - name: Prepare server directory
        run: ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "mkdir -p ${{ env.DEPLOY_DIR }}"

      - name: Sync infra to server
        run: rsync -az --delete ./infra/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:${{ env.DEPLOY_DIR }}/infra/

      - name: Write production env
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "mkdir -p ${{ env.DEPLOY_DIR }}/infra/env && cat > ${{ env.DEPLOY_DIR }}/infra/env/.env << 'EOF'
          APP_NAME=meeting_app
          APP_ENV=production

          NODE_ENV=production
          PORT=3000
          ENABLE_SWAGGER=false

          API_PREFIX=/api
          HEALTH_CHECK_ROUTE=/health

          DB_HOST=mysql
          DB_PORT=3306
          DB_USER=root
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_BASE=book_rooms_system

          REDIS_HOST=redis
          REDIS_PORT=6379

          JWT_SEC=${{ secrets.JWT_SEC }}

          MYSQL_CONTAINER_NAME=bookstore_mysql_prod
          REDIS_CONTAINER_NAME=bookstore_redis_prod
          EOF
          chmod 600 ${{ env.DEPLOY_DIR }}/infra/env/.env"

      - name: Deploy to server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} '
            set -e
            cd ${{ env.DEPLOY_DIR }}

            echo "login registry"
            echo "${{ secrets.DOCKER_REGISTER_PWD }}" | docker login ${{ secrets.DOCKER_REGISTER }} \
              -u ${{ secrets.DOCKER_REGISTER_USERNAME }} \
              --password-stdin

            echo "start pull image"
            docker compose --env-file ./infra/env/.env -f ./infra/compose/docker-compose.prod.yaml pull backend

            echo "start run container"
            docker compose --env-file ./infra/env/.env -f ./infra/compose/docker-compose.prod.yaml up -d

            echo "Health check"
            for i in {1..10}; do
              if curl -f http://localhost/health; then
                echo "Deploy success"
                exit 0
              fi
              echo "Waiting for app..."
              sleep 2
            done

            echo "Deploy failed"
            docker compose --env-file ./infra/env/.env -f ./infra/compose/docker-compose.prod.yaml logs --tail=100
            exit 1
          '
